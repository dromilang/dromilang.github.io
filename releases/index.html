<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dromi Releases</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e8f5e9;
}

/* TOP BAR */
.topbar {
  background: #2e7d32;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.logo {
  font-weight: bold;
}

/* HAMBURGER */
.hamburger {
  font-size: 26px;
  cursor: pointer;
}

/* OVERLAY MENU */
.menu-overlay {
  position: fixed;
  top: 0;
  right: -100%;
  width: 75%;
  height: 100%;
  background: #2e7d32;
  transition: 0.3s;
  z-index: 2000;
}

/* APERTO */
.menu-overlay.open {
  right: 0;
}

/* iframe dentro */
.menu-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* SFONDO SCURO */
.overlay-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 1000;
}

.overlay-bg.show {
  display: block;
}

/* CONTENUTO */
.header {
  text-align: center;
  padding: 60px 20px;
}

.header h1 {
  color: #2e7d32;
}

/* RELEASES */
.releases {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 300px;
  margin: 30px auto;
}

.release {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-decoration: none;
  color: #2e7d32;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.2s;
  text-align: center;
}

.release:hover {
  transform: scale(1.05);
  background: #2e7d32;
  color: white;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Dromi Releases</div>
  <div class="hamburger" onclick="openMenu()">☰</div>
</div>

<!-- SFONDO SCURO -->
<div class="overlay-bg" id="bg" onclick="closeMenu()"></div>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menu">
  <iframe src="menubar.html"></iframe>
</div>

<!-- CONTENUTO -->
<div class="header">
  <h1>Dromi Releases</h1>
  <p>Guarda le note di release di ogni versione.</p>

<div class="releases">
  <a class="release" href="112.html">🔧 1.1.2</a>
  <a class="release" href="111.html">😄 1.1.1</a>
  <a class="release" href="110.html">🚀 1.1.0</a>
  <a class="release" href="103.html">✨ 1.0.3</a>
  <a class="release" href="102.html">🔧 1.0.2</a>
  <a class="release" href="101.html">⚡ 1.0.1</a>
  <a class="release" href="100.html">🎉 1.0.0</a>
</div>
</div>

<script>
function openMenu() {
  document.getElementById("menu").classList.add("open");
  document.getElementById("bg").classList.add("show");
}

function closeMenu() {
  document.getElementById("menu").classList.remove("open");
  document.getElementById("bg").classList.remove("show");
}

</script>

</body>
</html>
