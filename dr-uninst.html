<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dromi - Uninstaller</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e8f5e9;
}

/* TOP BAR */
.topbar {
  background: #2e7d32;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.logo {
  font-weight: bold;
}

.hamburger {
  font-size: 26px;
  cursor: pointer;
}

/* MENU */
.menu-overlay {
  position: fixed;
  top: 0;
  right: -100%;
  width: 75%;
  height: 100%;
  background: #2e7d32;
  transition: 0.3s;
  z-index: 2000;
}

.menu-overlay.open {
  right: 0;
}

.menu-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* BACKGROUND */
.overlay-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 1000;
}

.overlay-bg.show {
  display: block;
}

/* CONTENT */
.container {
  text-align: center;
  padding: 60px 20px;
}

.container h1 {
  color: #2e7d32;
}

form {
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, textarea {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #2e7d32;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #1b5e20;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Disinstalla Dromi</div>
  <div class="hamburger" onclick="openMenu()">☰</div>
</div>

<!-- BACKGROUND -->
<div class="overlay-bg" id="bg" onclick="closeMenu()"></div>

<!-- MENU -->
<div class="menu-overlay" id="menu">
  <iframe src="menubar.html"></iframe>
</div>

<!-- CONTENT -->
<div class="container">
  <h1>Disinstalla Dromi</h1>
  <p>Compila il modulo per ottenere il file di disinstallazione</p>

  <form>
    <input type="text" placeholder="Perché vuoi disinstallare Dromi?">
    <textarea placeholder="Cosa non ti è piaciuto?"></textarea>

    <button type="button"
      onclick="window.location.href='https://github.com/dromilang/Dromi/raw/refs/heads/main/Tools/DromiUninstallerGUI.exe'">
      Ottieni il file
    </button>

    <button type="button"
      onclick="window.open('https://github.com/dromilang/Dromi/issues', '_blank')">
      Apri Issue GitHub
    </button>
  </form>
  <p>Peccato, ci mancherai!</p>
</div>

<script>
function openMenu() {
  document.getElementById("menu").classList.add("open");
  document.getElementById("bg").classList.add("show");
}

function closeMenu() {
  document.getElementById("menu").classList.remove("open");
  document.getElementById("bg").classList.remove("show");
}
</script>

</body>
</html>
