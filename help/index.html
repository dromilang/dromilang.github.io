<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dromi Help</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e8f5e9;
}

/* TOP BAR */
.topbar {
  background: #2e7d32;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.logo {
  font-weight: bold;
}

/* HAMBURGER */
.hamburger {
  font-size: 26px;
  cursor: pointer;
}

/* MENU OVERLAY */
.menu-overlay {
  position: fixed;
  top: 0;
  right: -100%;
  width: 75%;
  height: 100%;
  background: #2e7d32;
  transition: 0.3s;
  z-index: 2000;
}

.menu-overlay.open {
  right: 0;
}

.menu-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* SFONDO */
.overlay-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 1000;
}

.overlay-bg.show {
  display: block;
}

/* HEADER */
.header {
  text-align: center;
  padding: 50px 20px 20px;
}

.header h1 {
  color: #2e7d32;
  margin-bottom: 10px;
}

.header p {
  color: #444;
}

/* GRID FAQ */
.faq-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  text-decoration: none;
  color: black;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  background: #c8e6c9;
}

.card h3 {
  color: #2e7d32;
  margin-top: 0;
}

.card p {
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Dromi Help</div>
  <div class="hamburger" onclick="openMenu()">☰</div>
</div>

<!-- SFONDO -->
<div class="overlay-bg" id="bg" onclick="closeMenu()"></div>

<!-- MENU -->
<div class="menu-overlay" id="menu">
  <iframe src="menubar.html"></iframe>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Centro Assistenza Dromi</h1>
  <p>Domande frequenti e guide sul linguaggio Dromi</p>
</div>

<!-- FAQ CARDS -->
<div class="faq-container">

  <a href="what-is.html" class="card">
    <h3>Cos'è Dromi?</h3>
    <p>Scopri cosa è il linguaggio Dromi e a cosa serve.</p>
  </a>

  <a href="issue.html" class="card">
    <h3>Invia un problema</h3>
    <p>Segnala un problema di Dromi.</p>
  </a>

    <a href="linux.html" class="card">
    <h3>Dromi per Linux</h3>
    <p>Scopri sulla build per Linux.</p>
  </a>
</div>

<script>
function openMenu() {
  document.getElementById("menu").classList.add("open");
  document.getElementById("bg").classList.add("show");
}

function closeMenu() {
  document.getElementById("menu").classList.remove("open");
  document.getElementById("bg").classList.remove("show");
}
</script>

</body>
</html>
