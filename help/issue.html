<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segnala un problema</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e8f5e9;
}

/* TOPBAR */
.topbar {
  background: #2e7d32;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.logo {
  font-weight: bold;
}

/* CONTENUTO */
.container {
  max-width: 800px;
  margin: auto;
  padding: 30px 20px;
}

/* BOX */
.box {
  background: white;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
  color: #2e7d32;
  margin-top: 0;
}

p {
  color: #444;
  line-height: 1.6;
}

/* CODICE */
 pre, code {
  background: #1b5e20;
  color: #c8e6c9;
  padding: 15px;
  border-radius: 8px;
  font-family: monospace;
  margin: 15px 0;
}

/* BOTTONE */
.back {
  display: inline-block;
  margin-top: 20px;
  text-decoration: none;
  background: #2e7d32;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  transition: 0.2s;
}

.back:hover {
  background: #1b5e20;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Dromi Help</div>
</div>

<!-- CONTENUTO -->
<div class="container">
  <div class="box" id="content"></div>

  <div style="text-align:center;">
    <a href="index.html" class="back">⬅ Torna alla Home</a>
  </div>
</div>

</body>

<script>
fetch("md/issue.md")
  .then(response => response.text())
  .then(text => {
    document.getElementById("content").innerHTML = marked.parse(text);
  });
</script>
</html>
