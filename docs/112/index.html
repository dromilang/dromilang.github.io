<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dromi Docs: 1.1.2</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e8f5e9;
}

/* TOP BAR */
.topbar {
  background: #2e7d32;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

/* BOTTONE BACK */
.back-btn {
  background: rgba(255,255,255,0.15);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  font-size: 14px;
}

.back-btn:hover {
  background: rgba(255,255,255,0.25);
}

/* CONTENUTO */
.container {
  padding: 25px;
  max-width: 900px;
  margin: auto;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  color: #2e7d32;
  margin-bottom: 10px;
}

/* STEP GUIDE */
.steps {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.step {
  display: flex;
  align-items: flex-start;
  gap: 15px;
  background: white;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: all 0.25s ease;
}

.step:hover {
  transform: translateY(-4px) scale(1.01);
  background: #c8e6c9;
}

/* NUMERO */
.step-number {
  min-width: 40px;
  height: 40px;
  background: #2e7d32;
  color: white;
  font-weight: bold;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* LINK LISTA */
.step-text {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.step-text a {
  color: #1b5e20;
  font-weight: bold;
  text-decoration: none;
  padding: 4px 0;
  transition: 0.2s;
}

.step-text a:hover {
  text-decoration: underline;
  transform: translateX(3px);
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .container {
    padding: 15px;
  }

  .step {
    flex-direction: column;
    align-items: flex-start;
  }

  .step-number {
    margin-bottom: 10px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">Dromi Docs: 1.1.2</div>
  <div class="back-btn" onclick="goBack()">⬅ Torna alla home dei Docs</div>
</div>

<div class="container">

  <div class="header">
    <h1>Dromi 1.1.2</h1>
    <p>Questa versione contiene cambiamenti reletivi alla DEP 2</p>
  </div>

  <div class="steps">

    <div class="step">
      <div class="step-number">1</div>
      <div class="step-text">
        <a href="inst.html">📦 Installazione</a>
        <a href="script.html">💻 Primo Script</a>
        <a href="pip.html">📦 Script con PIP</a>
      </div>
    </div>

    <div class="step">
      <div class="step-number">2</div>
      <div class="step-text">
        <a href="lista.html">📋 Fare una lista</a>
        <a href="trblshooting.html">🛠 Risoluzione problemi</a>
      </div>
    </div>

  </div>

</div>

<script>
function goBack() {
  window.location.href = "../";
}
</script>

</body>
</html>
