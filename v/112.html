<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1.1.2</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e8f5e9;
}

/* TOP BAR */
.topbar {
  background: #2e7d32;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.logo {
  font-weight: bold;
}

/* HAMBURGER */
.hamburger {
  font-size: 26px;
  cursor: pointer;
}

/* OVERLAY MENU */
.menu-overlay {
  position: fixed;
  top: 0;
  right: -100%;
  width: 75%;
  height: 100%;
  background: #2e7d32;
  transition: 0.3s;
  z-index: 2000;
}

/* APERTO */
.menu-overlay.open {
  right: 0;
}

/* iframe dentro */
.menu-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* SFONDO SCURO */
.overlay-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 1000;
}

.overlay-bg.show {
  display: block;
}

/* CONTENUTO */
.header {
  text-align: center;
  padding: 60px 20px;
}

.header h1 {
  color: #2e7d32;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Dromi</div>
  <div class="hamburger" onclick="openMenu()">☰</div>
</div>

<!-- SFONDO SCURO -->
<div class="overlay-bg" id="bg" onclick="closeMenu()"></div>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menu">
  <iframe src="menubar.html"></iframe>
</div>

<!-- CONTENUTO -->
<div class="header">
  <h1>1.1.1</h1>
  <p><a href="https://github.com/DeMENIGECO/Dromi/wiki/About-1.1.2">Wiki GitHub</a></p>
</div>

<script>
function openMenu() {
  document.getElementById("menu").classList.add("open");
  document.getElementById("bg").classList.add("show");
}

function closeMenu() {
  document.getElementById("menu").classList.remove("open");
  document.getElementById("bg").classList.remove("show");
}
</script>

</body>
</html>
